<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Sun circle -->
  <circle cx="16" cy="13" r="4.5" fill="none" stroke="white" stroke-width="2"/>
  <!-- Sun rays -->
  <line x1="16" y1="4"    x2="16"   y2="6.5"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22.5" y1="7"  x2="21"   y2="8.5"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25"   y1="13" x2="22.5" y2="13"   stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="9.5"  y1="7"  x2="11"   y2="8.5"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="7"    y1="13" x2="9.5"  y2="13"   stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Horizon line -->
  <line x1="5" y1="22" x2="27" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
